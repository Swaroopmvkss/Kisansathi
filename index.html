<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>KisanSathi — किसान साथी</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g1:#5da030;--g2:#2a6018;--glt:#82c848;--gdim:rgba(80,160,40,.18);--gbdr:rgba(80,160,40,.28);--bg:#071a07;--bg2:#0c2610;--text:#c5e870;--dim:#6a8a50;--w4:rgba(255,255,255,.04);--w7:rgba(255,255,255,.07);--w9:rgba(255,255,255,.09)}
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,#152e08 100%);font-family:'Segoe UI','Noto Sans Devanagari','Noto Sans',Arial,sans-serif;color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(80,160,40,.3);border-radius:4px}
#app{display:flex;flex-direction:column;height:100vh;max-width:720px;margin:0 auto;padding:0 14px;position:relative;z-index:1}
#app::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 15% 15%,rgba(80,150,30,.12) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(40,110,15,.16) 0%,transparent 55%)}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 9px;flex-shrink:0;border-bottom:1px solid rgba(80,160,40,.1);position:relative;z-index:20}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 14px rgba(80,160,40,.45);flex-shrink:0}
.logo-title{color:var(--glt);font-size:17px;font-weight:700}
.logo-sub{color:#4e8030;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center}
.pill{display:flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;border:1px solid var(--gbdr);background:var(--gdim);color:var(--glt);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:500;user-select:none}
.pill:hover{background:rgba(80,160,40,.26)}
.pill.muted{background:rgba(255,70,70,.1);border-color:rgba(255,70,70,.3);color:#ff8888}
.lang-wrap{position:relative}
#lang-menu{display:none;position:absolute;right:0;top:38px;z-index:999;background:#091f09;border:1px solid var(--gbdr);border-radius:12px;padding:5px;min-width:168px;box-shadow:0 14px 50px rgba(0,0,0,.85);max-height:260px;overflow-y:auto}
#lang-menu.open{display:block}
#lang-menu button{display:block;width:100%;text-align:left;padding:6px 10px;border-radius:7px;border:none;background:transparent;color:#90b870;cursor:pointer;font-size:13px;font-weight:500;transition:background .12s;font-family:inherit}
#lang-menu button:hover,#lang-menu button.active{background:var(--gdim);color:var(--glt)}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.screen.active{display:flex}
#setup{overflow-y:auto;padding-bottom:20px}
.hero{text-align:center;padding:14px 0 10px}
.hero-icon{font-size:44px;margin-bottom:6px;filter:drop-shadow(0 0 10px rgba(80,160,40,.4))}
.hero h1{color:var(--text);font-size:21px;font-weight:700;margin-bottom:4px}
.hero p{color:#528040;font-size:12px;line-height:1.5}

/* SETUP BOX */
.setup-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.26);border-radius:12px;padding:14px 15px;margin-bottom:14px}
.setup-box.done{background:rgba(80,160,40,.07);border-color:rgba(80,160,40,.26)}
.sb-title{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:#fbbf24}
.sb-title.done{color:var(--glt)}
.sb-row{display:flex;gap:7px}
.sb-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(245,158,11,.3);border-radius:9px;padding:9px 12px;color:#ffe0a0;font-size:13px;outline:none;font-family:inherit;transition:border .2s}
.sb-inp::placeholder{color:rgba(245,158,11,.35)}
.sb-inp:focus{border-color:rgba(245,158,11,.6)}
.sb-btn{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);border-radius:9px;padding:9px 14px;color:#fbbf24;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;font-family:inherit;transition:all .2s}
.sb-btn:hover{background:rgba(245,158,11,.32)}
.sb-hint{font-size:10.5px;margin-top:7px;color:rgba(245,158,11,.55);line-height:1.5}
.sb-hint a{color:#fbbf24;text-decoration:underline}
.sb-ok{color:#82c848;font-size:11px;margin-top:6px;font-weight:600;display:none}

.voice-box{background:var(--w4);border:1px solid var(--gbdr);border-radius:10px;padding:10px 14px;margin-bottom:13px}
.vb-title{color:var(--glt);font-size:12px;font-weight:600;margin-bottom:5px}
.vb-row{display:flex;gap:14px;flex-wrap:wrap}
.vb-item{font-size:12px}
.vb-ok{color:#7dc848}.vb-bad{color:#ff7070}
.vb-warn{color:#ffb060;font-size:11px;margin-top:5px;line-height:1.4}

.lbl{color:var(--glt);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:5px;margin-top:13px;font-weight:600}
.field-inp{width:100%;padding:10px 13px;border-radius:9px;background:var(--w4);border:1px solid var(--gbdr);color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.field-inp:focus{border-color:var(--glt)}
.field-inp::placeholder{color:rgba(80,160,40,.35)}
.crop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.crop-btn{padding:9px 4px;border-radius:10px;cursor:pointer;background:var(--w4);border:1px solid rgba(80,160,40,.15);color:var(--dim);font-size:11px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;font-family:inherit}
.crop-btn .ce{font-size:20px}
.crop-btn:hover{background:rgba(80,160,40,.1);border-color:var(--gbdr)}
.crop-btn.sel{background:linear-gradient(135deg,rgba(80,160,40,.36),rgba(40,100,20,.36));border:2px solid var(--glt);color:var(--text)}
.start-btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;background:var(--w4);border:1px solid rgba(80,160,40,.15);color:#336020;cursor:not-allowed;transition:all .3s;margin-top:14px;font-family:inherit}
.start-btn.ready{background:linear-gradient(135deg,var(--g1),var(--g2));border:none;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(80,160,40,.28)}
.start-btn.ready:hover{filter:brightness(1.08)}

#chat{gap:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--w4);border-radius:9px;margin-bottom:9px;border:1px solid rgba(80,160,40,.12);flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-emoji{font-size:19px}
.tb-name{color:var(--glt);font-size:13px;font-weight:600}
.tb-loc{color:#3e6828;font-size:10px;margin-top:1px}
.tb-right{display:flex;gap:5px;align-items:center}
.tb-lang{color:#3a6020;font-size:10px;font-weight:500}
.stop-btn{background:rgba(255,140,20,.13);border:1px solid rgba(255,140,20,.3);border-radius:7px;padding:3px 9px;color:#ffa040;cursor:pointer;font-size:11px;font-weight:600;display:none;font-family:inherit;animation:blink 1.3s infinite}
.new-btn{background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.18);border-radius:7px;padding:3px 9px;color:#ff9090;cursor:pointer;font-size:11px;font-family:inherit}
#messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:11px;padding:4px 0 6px}
.mrow{display:flex;align-items:flex-start;animation:msgIn .3s ease}
.mrow.user{justify-content:flex-end}
.av{width:28px;height:28px;border-radius:50%;min-width:28px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:3px}
.av.bot{background:linear-gradient(135deg,var(--g1),var(--g2));margin-right:6px}
.av.user{background:rgba(80,160,40,.15);border:1px solid var(--gbdr);margin-left:6px}
.bwrap{max-width:81%;position:relative;padding-bottom:6px}
.bubble{padding:10px 13px;font-size:13.5px;line-height:1.68}
.bubble.bot{border-radius:14px 14px 14px 3px;background:var(--w7);border:1px solid var(--w9);color:#aad870}
.bubble.user{border-radius:14px 14px 3px 14px;background:linear-gradient(135deg,rgba(80,160,40,.28),rgba(40,100,20,.28));border:1px solid rgba(80,160,40,.36);color:var(--text)}
.replay-btn{position:absolute;bottom:-2px;right:4px;background:rgba(80,160,40,.12);border:1px solid rgba(80,160,40,.22);border-radius:10px;padding:1px 7px;color:#5a8a30;cursor:pointer;font-size:10px;font-weight:500;font-family:inherit}
.typing-row{display:flex;align-items:center;gap:7px;animation:msgIn .3s ease}
.dots{display:flex;gap:4px;align-items:center;padding:10px 14px;border-radius:14px 14px 14px 3px;background:var(--w7);border:1px solid var(--w9)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g1);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
.input-area{flex-shrink:0;padding:8px 0 12px;position:relative;z-index:5}
.err-bar{background:rgba(220,50,10,.12);border:1px solid rgba(220,50,10,.3);border-radius:8px;padding:7px 12px;margin-bottom:7px;color:#ff9060;font-size:12px;display:none;justify-content:space-between;align-items:center;gap:8px;line-height:1.4}
.err-bar button{background:none;border:none;color:#ff9060;cursor:pointer;font-size:16px;flex-shrink:0}
.listen-bar{background:rgba(80,160,40,.09);border:1px dashed rgba(80,160,40,.35);border-radius:8px;padding:7px 12px;margin-bottom:7px;color:var(--glt);font-size:13px;display:none;align-items:center;gap:9px;font-style:italic}
.lp{animation:micRing 1s infinite;display:inline-block}
.input-row{display:flex;gap:6px;align-items:center;background:var(--w4);border-radius:13px;border:1.5px solid rgba(80,160,40,.22);padding:6px 6px 6px 14px;transition:all .3s}
.input-row.on{border-color:rgba(80,220,40,.5);box-shadow:0 0 20px rgba(80,220,40,.1)}
#txt{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit}
#txt::placeholder{color:rgba(80,160,40,.38)}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;font-family:inherit}
.mic-btn{background:linear-gradient(135deg,#3a8020,#1a5010);color:#fff;box-shadow:0 2px 10px rgba(60,130,30,.35)}
.mic-btn.on{background:linear-gradient(135deg,#c82010,#7a0800);animation:micRing 1s infinite}
.mic-btn:disabled{background:rgba(60,60,60,.5);color:#555;cursor:not-allowed;animation:none;box-shadow:none}
.send-btn{background:rgba(80,160,40,.08);color:#336020;cursor:not-allowed}
.send-btn.go{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;cursor:pointer}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.qbtn{background:rgba(80,160,40,.06);border:1px solid rgba(80,160,40,.15);border-radius:20px;padding:3px 11px;color:#4e7030;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;transition:all .2s}
.qbtn:hover{background:rgba(80,160,40,.18);color:var(--glt)}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes micRing{0%{box-shadow:0 0 0 0 rgba(200,40,10,.7)}70%{box-shadow:0 0 0 14px rgba(200,40,10,0)}100%{box-shadow:0 0 0 0 rgba(200,40,10,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.crop-grid{grid-template-columns:repeat(3,1fr)}.hero h1{font-size:19px}.bubble{font-size:13px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <div>
        <div class="logo-title">KisanSathi</div>
        <div class="logo-sub" id="hdr-sub">किसान साथी • AI Voice Farm Guide</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="pill" id="voice-toggle" onclick="toggleVoice()">🔊 <span id="voice-lbl">Voice</span></button>
      <div class="lang-wrap">
        <button class="pill" onclick="toggleLang(event)">🌐 <span id="cur-lang">English</span> ▾</button>
        <div id="lang-menu"></div>
      </div>
    </div>
  </header>

  <!-- SETUP -->
  <div class="screen active" id="setup">
    <div class="hero">
      <div class="hero-icon">🌾</div>
      <h1 id="hero-title">Apni Fasal, Apni Awaaz</h1>
      <p id="hero-sub">Your AI farming guide — speak or type in your language</p>
    </div>

    <!-- VOICE STATUS -->
    <div class="voice-box">
      <div class="vb-title" id="vs-title">🎙️ Voice Status</div>
      <div class="vb-row">
        <span class="vb-item" id="vs-mic">⏳ Checking…</span>
        <span class="vb-item" id="vs-spk">⏳ Checking…</span>
      </div>
      <div class="vb-warn" id="vs-warn" style="display:none"></div>
    </div>

    <label class="lbl" id="lbl-loc">📍 Your Location</label>
    <input class="field-inp" id="loc-inp" type="text" placeholder="State / District  e.g. Punjab, Ludhiana"/>

    <label class="lbl" id="lbl-crop">🌱 Select Your Crop</label>
    <div class="crop-grid" id="crop-grid"></div>

    <button class="start-btn" id="start-btn" onclick="startChat()" disabled>
      <span id="start-lbl">Please select a crop first</span>
    </button>
  </div>

  <!-- CHAT -->
  <div class="screen" id="chat">
    <div class="topbar">
      <div class="tb-left">
        <span class="tb-emoji" id="tb-emoji"></span>
        <div>
          <div class="tb-name" id="tb-name"></div>
          <div class="tb-loc" id="tb-loc"></div>
        </div>
      </div>
      <div class="tb-right">
        <button class="stop-btn" id="stop-btn" onclick="stopSpeak()">⏹ <span id="lbl-stop">Stop</span></button>
        <span class="tb-lang" id="tb-lang"></span>
        <button class="new-btn" onclick="resetApp()"><span id="lbl-new">✕ New</span></button>
      </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <div class="err-bar" id="err-bar"><span id="err-msg"></span><button onclick="hideErr()">✕</button></div>
      <div class="listen-bar" id="listen-bar"><span class="lp">🎙️</span><span id="live-txt"></span></div>
      <div class="input-row" id="input-row">
        <input id="txt" type="text" onkeydown="onKey(event)" oninput="syncSend()"/>
        <button class="icon-btn mic-btn" id="mic-btn" onclick="toggleMic()">🎙️</button>
        <button class="icon-btn send-btn" id="send-btn" onclick="doSend()" disabled>➤</button>
      </div>
      <div class="quick-row" id="quick-row"></div>
    </div>
  </div>
</div>

  $("crop-grid").innerHTML=CROPS.map(c=>
    `<button class="crop-btn${S.crop===c.n?" sel":""}" id="cb-${c.n}" onclick="pickCrop('${c.n}')">
      <span class="ce">${c.e}</span>${c.n}</button>`).join("");
}
function pickCrop(n){
  S.crop=n;document.querySelectorAll(".crop-btn").forEach(b=>b.classList.remove("sel"));
  $("cb-"+n)?.classList.add("sel");updateStartBtn();
}
function updateStartBtn(){
  const l=L(),c=CROPS.find(x=>x.n===S.crop),ready=!!S.crop;
  const sb=$("start-btn");sb.disabled=!ready;sb.className="start-btn"+(ready?" ready":"");
  $("start-lbl").textContent=ready?`${l.startReady} — ${c?.e} ${S.crop}`:l.startWait;
}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");}
function startChat(){
  if(!S.crop)return;
  S.loc=$("loc-inp").value.trim();S.msgs=[];
  const c=CROPS.find(x=>x.n===S.crop);
  $("tb-emoji").textContent=c?.e||"";$("tb-name").textContent=S.crop;
  $("tb-loc").textContent=S.loc?"📍 "+S.loc:"";$("tb-lang").textContent=L().label;
  showScreen("chat");$("messages").innerHTML="";
  const greet=L().greet(S.crop,S.loc);
  addMsg("bot",greet);if(S.autoSpeak)speak(greet.replace(/<[^>]+>/g,""));
  setTimeout(()=>$("txt").focus(),150);
}
function resetApp(){
  stopSpeak();stopListen();S.crop=null;S.msgs=[];S.loc="";
  $("loc-inp").value="";buildCrops();updateStartBtn();showScreen("setup");
}
function addMsg(role,text){
  S.msgs.push({role:role==="bot"?"assistant":"user",content:text.replace(/<[^>]+>/g,"")});
  const box=$("messages"),isBot=role==="bot",row=document.createElement("div");
  row.className="mrow "+role;
  row.innerHTML=isBot
    ?`<div class="av bot">🌿</div><div class="bwrap"><div class="bubble bot">${text}</div>${S.hasTts?`<button class="replay-btn" onclick='speak(${JSON.stringify(text.replace(/<[^>]+>/g,""))})'>🔊</button>`:""}</div>`
    :`<div class="bwrap"><div class="bubble user">${text}</div></div><div class="av user">👨‍🌾</div>`;
  box.appendChild(row);box.scrollTop=box.scrollHeight;
}
function showTyping(){
  const el=document.createElement("div");el.className="typing-row";el.id="typing";
  el.innerHTML=`<div class="av bot">🌿</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  $("messages").appendChild(el);$("messages").scrollTop=$("messages").scrollHeight;
}
function hideTyping(){const e=$("typing");if(e)e.remove();}
function md(t){return(t||"").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>").replace(/\n/g,"<br/>");}

async function doSend(override){
  const inp=$("txt"),text=(override||inp.value).trim();
  if(!text)return;
  inp.value="";syncSend();stopListen();hideErr();
  addMsg("user",text);showTyping();
  const l=L();
  const sys=`${SYS}\nSESSION:\n- Language: ${l.label} (${l.bcp}) — RESPOND ONLY IN THIS LANGUAGE\n- Crop: ${S.crop}\n- Location: ${S.loc||"Not specified"}`;
  const hist=S.msgs.map(m=>({role:m.role,content:m.content}));
  try{
    const r=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:sys,messages:hist})
    });
    const data=await r.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content?.map(b=>b.text||"").join("\n")||"Sorry, no response.";
    hideTyping();addMsg("bot",md(raw));if(S.autoSpeak)speak(raw);
  }catch(e){
    hideTyping();
    showErr(e.message.includes("Failed to fetch")?"⚠️ Connection error. Check your internet.":"⚠️ "+e.message);
  }
}
function sendQuick(q){doSend(q);}
function onKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}}
function syncSend(){const v=$("txt").value.trim(),b=$("send-btn");b.disabled=!v;b.className="icon-btn send-btn"+(v?" go":"");}
function buildQuickBtns(){$("quick-row").innerHTML=L().quickQ.map(q=>`<button class="qbtn" onclick="sendQuick(${JSON.stringify(q)})">${q}</button>`).join("");}
function toggleMic(){S.listening?stopListen():startListen();}
function startListen(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showErr("Speech recognition not supported. Use Chrome or Edge.");return;}
  stopSpeak();hideErr();
  const rec=new SR();rec.lang=L().bcp;rec.interimResults=true;rec.continuous=false;S.rec=rec;
  rec.onstart=()=>{S.listening=true;$("mic-btn").classList.add("on");$("mic-btn").textContent="⏹";$("input-row").classList.add("on");$("listen-bar").style.display="flex";$("live-txt").textContent=L().listenHint;$("txt").placeholder=L().listenHint;};
  rec.onresult=e=>{let f="",i="";for(let x=e.resultIndex;x<e.results.length;x++){const t=e.results[x][0].transcript;if(e.results[x].isFinal)f+=t;else i+=t;}const h=f||i;$("live-txt").textContent=`"${h}"`;if(f){$("txt").value=f;syncSend();}};
  rec.onerror=e=>{stopListen();const m={"not-allowed":"🔒 Mic blocked — tap lock icon → Allow Microphone.","no-speech":"No speech detected.","network":"Network error.","aborted":""};if(m[e.error])showErr(m[e.error]);};
  rec.onend=()=>stopListen();
  try{rec.start();}catch(e){showErr("Mic error: "+e.message);}
}
function stopListen(){
  if(S.rec){try{S.rec.stop();}catch(e){}S.rec=null;}
  S.listening=false;$("mic-btn").classList.remove("on");$("mic-btn").textContent="🎙️";
  $("input-row").classList.remove("on");$("listen-bar").style.display="none";
  $("txt").placeholder=L().inputPh;
}
function speak(text){
  if(!S.hasTts||!S.autoSpeak)return;speechSynthesis.cancel();
  const clean=text.replace(/<[^>]+>/g,"").replace(/\*\*(.*?)\*\*/g,"$1").replace(/\*(.*?)\*/g,"$1").replace(/\n+/g,". ").replace(/\s{2,}/g," ").trim();
  const u=new SpeechSynthesisUtterance(clean);u.lang=L().bcp;u.rate=0.88;u.pitch=1.0;u.volume=1.0;
  const vs=speechSynthesis.getVoices();
  const best=vs.find(v=>v.lang===L().bcp)||vs.find(v=>v.lang.startsWith(L().bcp.split("-")[0]));
  if(best)u.voice=best;
  u.onstart=()=>{S.speaking=true;$("stop-btn").style.display="flex";};
  u.onend=()=>{S.speaking=false;$("stop-btn").style.display="none";};
  u.onerror=e=>{if(e.error!=="interrupted"){S.speaking=false;$("stop-btn").style.display="none";}};
  if(speechSynthesis.paused)speechSynthesis.resume();speechSynthesis.speak(u);
}
function stopSpeak(){if(S.hasTts)speechSynthesis.cancel();S.speaking=false;$("stop-btn").style.display="none";}
function toggleVoice(){S.autoSpeak=!S.autoSpeak;const b=$("voice-toggle");b.className="pill"+(S.autoSpeak?"":" muted");b.innerHTML=(S.autoSpeak?"🔊 ":"🔇 ")+'<span id="voice-lbl">'+L().voiceLbl+"</span>";if(!S.autoSpeak)stopSpeak();}
function showErr(m){$("err-bar").style.display="flex";$("err-msg").textContent=m;}
function hideErr(){$("err-bar").style.display="none";}
</script>
</body>
</html>
